name: "weather_analytics"
version: "1.0.0"
profile: "weather_analytics"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ============================================================
# Model materializations by folder
# ============================================================
# staging:      Views (cheap, just cleaned raw data)
# intermediate: Views (business logic, not queried directly)
# marts:        Tables (pre-computed, fast for dashboards)
# ============================================================
models:
  weather_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

seeds:
  weather_analytics:
    +schema: seeds
