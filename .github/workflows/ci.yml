name: Weather Pipeline CI

on:
  push:
    branches: [main]
    paths:
      - 'weather-analytics-pipeline/**'
  pull_request:
    branches: [main]
    paths:
      - 'weather-analytics-pipeline/**'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: weather-analytics-pipeline
        run: pip install -r requirements.txt

      - name: Install dbt packages
        working-directory: weather-analytics-pipeline/dbt_project
        run: dbt deps

      - name: Extract and load data
        working-directory: weather-analytics-pipeline
        run: python extract/load_to_duckdb.py

      - name: Run dbt build
        working-directory: weather-analytics-pipeline/dbt_project
        run: dbt build

      - name: Export CSVs for dashboard
        working-directory: weather-analytics-pipeline
        run: python extract/export_to_parquet.py

      - name: Commit and push updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weather-analytics-pipeline/evidence_dashboard/sources/weather/fct_daily_weather.csv \
                  weather-analytics-pipeline/evidence_dashboard/sources/weather/dim_cities.csv
          git diff --cached --quiet || git commit -m "chore: update dashboard data [skip ci]"
          git push
